version: 2

project_name: shadowbox

before:
  hooks:
    - go mod tidy

builds:
  - id: shadowbox
    main: ./cmd/shadowbox
    binary: shadowbox
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/EnJulian/shadowbox/internal/cmd.version={{ .Version }}
      - -X github.com/EnJulian/shadowbox/internal/cmd.commit={{ .Commit }}
      - -X github.com/EnJulian/shadowbox/internal/cmd.date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "shadowbox-{{ .Os }}-{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

sboms:
  - artifacts: archive

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true

homebrew_casks:
  - name: shadowbox
    binaries:
      - shadowbox
    repository:
      owner: EnJulian
      name: homebrew-shadowbox
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/EnJulian/shadowbox"
    description: "Music acquisition CLI for YouTube and Bandcamp"
    commit_author:
      name: goreleaser-bot
      email: goreleaser-bot@users.noreply.github.com
    dependencies:
      - formula: ffmpeg
      - formula: yt-dlp
    # The released binary is not notarized; strip the quarantine attribute so it
    # runs without the "damaged and cannot be opened" gatekeeper alert.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/shadowbox"]
          end

scoops:
  - name: shadowbox
    repository:
      owner: EnJulian
      name: scoop-shadowbox
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/EnJulian/shadowbox"
    description: "Music acquisition CLI for YouTube and Bandcamp"
    license: MIT
    commit_author:
      name: goreleaser-bot
      email: goreleaser-bot@users.noreply.github.com
    depends:
      - ffmpeg
      - yt-dlp

release:
  github:
    owner: EnJulian
    name: shadowbox
  draft: false
  prerelease: auto
  footer: |
    ## Installation

    Shadowbox requires `yt-dlp` and `ffmpeg` on your PATH (`aria2` is optional but recommended).

    ### Homebrew (macOS / Linux)
    ```
    brew install EnJulian/shadowbox
    ```

    ### Scoop (Windows)
    ```
    scoop bucket add shadowbox https://github.com/EnJulian/scoop-shadowbox
    scoop install shadowbox
    ```

    ### PowerShell (Windows, no Scoop)
    ```
    irm https://raw.githubusercontent.com/EnJulian/shadowbox/main/scripts/install.ps1 | iex
    ```

    ### Manual
    Download the archive for your platform below, extract it, and place the
    `shadowbox` binary on your PATH.
